name: CordCloud Auto Check-in

on:
  schedule:
    # Beijing time 09:30 every day.
    - cron: "30 1 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cordcloud-auto-checkin
  cancel-in-progress: false

jobs:
  auto_checkin:
    runs-on: ubuntu-latest
    environment: cloak_check_in_env
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Check date
        run: date

      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          ref: master

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run python -m unittest discover -s tests

      - name: Run check-in
        env:
          CORDCLOUD_EMAIL: ${{ secrets.CORDCLOUD_EMAIL }}
          CORDCLOUD_PASSWORD: ${{ secrets.CORDCLOUD_PASSWORD }}
          POP3_USERNAME: ${{ secrets.POP3_USERNAME }}
          POP3_PASSWORD: ${{ secrets.POP3_PASSWORD }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          POP3_HOST: ${{ vars.POP3_HOST }}
          POP3_PORT: ${{ vars.POP3_PORT }}
          POP3_USE_SSL: ${{ vars.POP3_USE_SSL }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL }}
          POP3_SCAN_LIMIT: ${{ vars.POP3_SCAN_LIMIT || '10' }}
          HEADLESS: "true"
          SAVE_HTML: "false"
          USE_PERSISTENT_CONTEXT: "false"
        run: uv run python main.py

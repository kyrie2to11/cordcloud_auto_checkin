name: CordCloud Auto Check-in

on:
  schedule:
    # Beijing time 08:00, 10:00, 12:00, 14:00, 16:00 every day.
    - cron: "0 0,2,4,6,8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cordcloud-auto-checkin
  cancel-in-progress: false

jobs:
  auto_checkin:
    runs-on: ubuntu-latest
    environment: cloak_check_in_env
    env:
      TZ: Asia/Shanghai
      MAX_CHECKIN_ATTEMPTS: "4"
      CHECKIN_RETRY_DELAY_SECONDS: "300"
    steps:
      - name: Check date
        id: checkin-date
        run: |
          date
          echo "date=$(date +%F)" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          ref: master

      - name: Restore daily success marker
        id: daily-success
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .checkin-success
          key: cordcloud-checkin-success-${{ steps.checkin-date.outputs.date }}

      - name: Skip if already checked in today
        if: github.event_name == 'schedule' && steps.daily-success.outputs.cache-hit == 'true'
        run: echo "Daily check-in already succeeded for ${{ steps.checkin-date.outputs.date }}."

      - name: Set up uv
        if: github.event_name != 'schedule' || steps.daily-success.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.daily-success.outputs.cache-hit != 'true'
        run: uv sync --locked

      - name: Run tests
        if: github.event_name != 'schedule' || steps.daily-success.outputs.cache-hit != 'true'
        run: uv run python -m unittest discover -s tests

      - name: Run check-in
        if: github.event_name != 'schedule' || steps.daily-success.outputs.cache-hit != 'true'
        env:
          CORDCLOUD_EMAIL: ${{ secrets.CORDCLOUD_EMAIL }}
          CORDCLOUD_PASSWORD: ${{ secrets.CORDCLOUD_PASSWORD }}
          POP3_USERNAME: ${{ secrets.POP3_USERNAME }}
          POP3_PASSWORD: ${{ secrets.POP3_PASSWORD }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          POP3_HOST: ${{ vars.POP3_HOST }}
          POP3_PORT: ${{ vars.POP3_PORT }}
          POP3_USE_SSL: ${{ vars.POP3_USE_SSL }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL }}
          POP3_SCAN_LIMIT: ${{ vars.POP3_SCAN_LIMIT || '10' }}
          HEADLESS: "true"
          SAVE_HTML: "false"
          USE_PERSISTENT_CONTEXT: "false"
        run: |
          for attempt in $(seq 1 "$MAX_CHECKIN_ATTEMPTS"); do
            echo "Check-in attempt ${attempt}/${MAX_CHECKIN_ATTEMPTS}"
            if uv run python main.py; then
              echo "Check-in confirmed."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_CHECKIN_ATTEMPTS" ]; then
              echo "Check-in not confirmed; retrying in ${CHECKIN_RETRY_DELAY_SECONDS}s."
              sleep "$CHECKIN_RETRY_DELAY_SECONDS"
            fi
          done

          echo "Check-in was not confirmed after ${MAX_CHECKIN_ATTEMPTS} attempts."
          exit 1

      - name: Write daily success marker
        if: github.event_name == 'schedule' && steps.daily-success.outputs.cache-hit != 'true'
        run: |
          mkdir -p .checkin-success
          date --iso-8601=seconds > .checkin-success/success.txt

      - name: Save daily success marker
        if: github.event_name == 'schedule' && steps.daily-success.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .checkin-success
          key: cordcloud-checkin-success-${{ steps.checkin-date.outputs.date }}
